---
- name: Configure EC2 for GitOps Lite
  hosts: app
  become: true
  vars:
    app_repo_url: "https://github.com/your-username/your-repo.git"
    app_branch: "main"
    app_dir: "/opt/gitops-lite"
    app_owner: "ec2-user"

  tasks:
    - name: Refresh apt cache on Debian family
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Refresh dnf cache on RedHat family
      ansible.builtin.dnf:
        update_cache: true
      when: ansible_facts["os_family"] == "RedHat"

    - name: Install Git and Docker
      ansible.builtin.package:
        name:
          - git
          - docker
        state: present

    - name: Enable and start Docker service
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add app owner to docker group
      ansible.builtin.user:
        name: "{{ app_owner }}"
        groups: docker
        append: true

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_owner }}"
        group: "{{ app_owner }}"
        mode: "0755"

    - name: Clone or update application repository
      ansible.builtin.git:
        repo: "{{ app_repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ app_branch }}"
        update: true
      become_user: "{{ app_owner }}"
